<h1 class="text-center mb-5 fw-bold text-warning">Tạo bài post</h1>
<form>
  <label for="postTitle" class="fw-bold fs-3 text-warning">Tiêu đề:</label>
  <input class="ms-3" type="text" id="postTitle" name="postTitle" required style="width: 25vw;"><br><br>
  <label for="topic" class="fw-semibold fs-6 text-warning  d-block">Chủ đề: </label>
  <select #topic id="topic" class="form-select mb-4" aria-label="Default select example" (change) ="onSelect(topic.value)">
    <option selected>Open this select menu</option>
    <option value="Tutorial">Tutorial</option>
    <option value="Social">Social</option>
    <option value="Programming">Programming</option>
    <option value="Sport">Sport</option>
    <option value="ESport">Esport</option>
    <option value="Angular">Angular</option>
    <option value="Javascript">Javascript</option>
    <option value="Typescript">Typescript</option>
  </select>
  <label for="postcoverImg" class="fw-semibold fs-6 text-warning">Ảnh bìa:</label>
  <input class="mb-4 ms-3"   type="file" (change)="onFileChange($event)" id="postcoverImg" name="postcoverImg">
  <img [src]="postCoverURL"class="d-block" style="width: 20vw;height:20vh "  alt="post-cover">


  <ckeditor
            id="editor" [editor]="Editor" [config]="editorConfig"
            [(ngModel)]="postData.content"
            name="content"

            #ckeditor
  ></ckeditor><br><br>

  <button (click)="savePost()">Đăng bài</button>
</form>
